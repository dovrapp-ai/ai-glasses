<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Glasses</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23000'/%3E%3Ccircle cx='22' cy='32' r='10' fill='none' stroke='%2300ff88' stroke-width='3'/%3E%3Ccircle cx='42' cy='32' r='10' fill='none' stroke='%2300ff88' stroke-width='3'/%3E%3C/svg%3E" />
<style>
:root {
  --bg: #000;
  --fg: #fff;
  --accent: #00ff88;
  --error: #ff3355;
  --muted: #888;
  --panel: rgba(255,255,255,0.06);
  --panel-strong: rgba(255,255,255,0.14);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg); color: var(--fg);
  font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
  overscroll-behavior: none;
  height: 100%;
  user-select: none;
  -webkit-user-select: none;
}
#root { position: fixed; inset: 0; display: flex; flex-direction: column; }
.screen { flex: 1; display: flex; flex-direction: column; }
.hidden { display: none !important; }
 
.setup { align-items: stretch; justify-content: center; gap: 14px; padding: 32px 22px; max-width: 520px; margin: 0 auto; width: 100%; }
.brand { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.brand svg { width: 36px; height: 36px; }
.brand h1 { margin: 0; font-size: 26px; letter-spacing: -0.5px; }
.setup p { color: var(--muted); margin: 0 0 12px; line-height: 1.5; font-size: 15px; }
.setup label { font-size: 13px; color: var(--muted); margin-bottom: -8px; }
.setup input, .setup textarea {
  background: var(--panel);
  border: 1px solid var(--panel-strong);
  color: var(--fg);
  padding: 14px 16px;
  border-radius: 12px;
  font-size: 16px;
  font-family: inherit;
  outline: none;
  width: 100%;
  resize: none;
}
.setup input:focus, .setup textarea:focus { border-color: var(--accent); }
.help { font-size: 13px; color: var(--muted); margin-top: -6px; line-height: 1.5; }
.help a { color: var(--accent); text-decoration: none; }
.btn {
  background: var(--accent); color: #000;
  border: none; padding: 16px 24px; border-radius: 12px;
  font-size: 17px; font-weight: 600; cursor: pointer;
  font-family: inherit; width: 100%; margin-top: 8px;
}
.btn:active { transform: scale(0.98); }
.btn.secondary { background: var(--panel); color: var(--fg); border: 1px solid var(--panel-strong); }
 
.live { padding: 0; position: relative; overflow: hidden; }
#video-bg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; z-index: 0;
}
.video-overlay {
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,0) 55%, rgba(0,0,0,0.85) 100%);
  pointer-events: none;
}
.live-content {
  position: relative; z-index: 2;
  flex: 1; display: flex; flex-direction: column;
  padding: 16px;
  padding-top: max(16px, env(safe-area-inset-top));
  padding-bottom: max(20px, env(safe-area-inset-bottom));
}
.status-bar {
  display: flex; align-items: center; gap: 10px;
  background: rgba(0,0,0,0.55);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  padding: 10px 16px;
  border-radius: 999px;
  align-self: flex-start;
  font-size: 14px;
  max-width: calc(100% - 8px);
}
.dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.dot.listening { background: var(--accent); animation: pulse 1.6s infinite; }
.dot.thinking { background: #ffaa00; animation: pulse 1s infinite; }
.dot.speaking { background: #00aaff; animation: pulse 0.8s infinite; }
.dot.connecting { background: #ffaa00; animation: pulse 0.6s infinite; }
.dot.error { background: var(--error); }
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.45; transform: scale(1.5); }
}
.spacer { flex: 1; }
.transcript {
  background: rgba(0,0,0,0.6);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 14px;
  font-size: 15px;
  line-height: 1.45;
  max-height: 50vh;
  overflow-y: auto;
}
.transcript:empty { display: none; }
.transcript .turn { margin-bottom: 12px; }
.transcript .turn:last-child { margin-bottom: 0; }
.transcript .who { font-size: 11px; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.6px; }
.transcript .turn[data-who="assistant"] .who { color: var(--accent); }
.transcript b { color: var(--fg); }
.controls { display: flex; gap: 14px; align-items: center; justify-content: center; }
.iconbtn {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border: 1px solid var(--panel-strong);
  color: var(--fg);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; cursor: pointer;
  font-family: inherit;
}
.iconbtn:active { transform: scale(0.94); }
.bigbtn {
  width: 88px; height: 88px;
  border-radius: 50%;
  background: var(--accent); color: #000;
  border: none;
  font-size: 16px; font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 32px rgba(0,255,136,0.35);
  font-family: inherit;
}
.bigbtn.stop { background: var(--error); color: #fff; box-shadow: 0 8px 32px rgba(255,51,85,0.35); }
.bigbtn:active { transform: scale(0.94); }
.muted { color: var(--muted); }
</style>
</head>
<body>
<div id="root">
 
  <div id="setup" class="screen setup">
    <div class="brand">
      <svg viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="#000"/><circle cx="22" cy="32" r="10" fill="none" stroke="#00ff88" stroke-width="3"/><circle cx="42" cy="32" r="10" fill="none" stroke="#00ff88" stroke-width="3"/></svg>
      <h1>Glasses</h1>
    </div>
    <p>A hands-free AI assistant that watches what you see and helps you do things &mdash; fix, build, install, troubleshoot.</p>
 
    <label>Gemini API key</label>
    <input id="api-key" type="password" placeholder="paste your key" autocomplete="off" autocapitalize="off" spellcheck="false" />
    <div class="help">Get a free key at <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com/apikey</a>. Stored only on this phone.</div>
 
    <label>What do you want help with? <span class="muted">(optional)</span></label>
    <textarea id="task" rows="3" placeholder="e.g. fixing my brake light, assembling an IKEA shelf, troubleshooting my router"></textarea>
 
    <details style="margin-top:4px">
      <summary class="help" style="cursor:pointer">Advanced</summary>
      <div style="margin-top:10px; display:flex; flex-direction:column; gap:10px">
        <label>Model</label>
        <input id="model" type="text" placeholder="gemini-2.5-flash" autocomplete="off" autocapitalize="off" spellcheck="false" />
        <label>Voice (substring of system voice name, e.g. "google")</label>
        <input id="voice" type="text" placeholder="leave empty for default" autocomplete="off" autocapitalize="off" spellcheck="false" />
        <label>Speech rate (0.5 to 2.0)</label>
        <input id="rate" type="text" placeholder="1.05" autocomplete="off" autocapitalize="off" spellcheck="false" />
      </div>
    </details>
 
    <button id="continue-btn" class="btn">Continue</button>
  </div>
 
  <div id="live" class="screen live hidden">
    <video id="video-bg" autoplay muted playsinline></video>
    <div class="video-overlay"></div>
    <div class="live-content">
      <div class="status-bar">
        <span id="status-dot" class="dot"></span>
        <span id="status-text">Tap start when ready</span>
      </div>
      <div class="spacer"></div>
      <div id="transcript" class="transcript"></div>
      <div class="controls">
        <button id="settings-btn" class="iconbtn" aria-label="Settings">&#9881;</button>
        <button id="start-btn" class="bigbtn">Start</button>
        <button id="mute-btn" class="iconbtn" aria-label="Mute speaker">&#128266;</button>
      </div>
    </div>
  </div>
</div>
 
<script>
const STORE_KEY = 'glasses-config-v2';
const DEFAULTS = { model: 'gemini-2.5-flash', voice: '', rate: '1.05' };
const config = (function(){ try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch { return {}; } })();
function saveConfig(c){ Object.assign(config, c); localStorage.setItem(STORE_KEY, JSON.stringify(config)); }
 
// migrate from v1 once
try {
  const v1raw = localStorage.getItem('glasses-config-v1');
  if (v1raw && !config.apiKey) {
    const v1 = JSON.parse(v1raw);
    if (v1.apiKey) saveConfig({ apiKey: v1.apiKey, task: v1.task || '' });
  }
} catch {}
 
const state = {
  status: 'idle',
  mediaStream: null,
  videoEl: document.getElementById('video-bg'),
  recognition: null,
  recognitionWantOn: false,
  conversation: [],
  muted: false,
  wakeLock: null,
};
 
const setupEl = document.getElementById('setup');
const liveEl = document.getElementById('live');
const apiKeyInput = document.getElementById('api-key');
const taskInput = document.getElementById('task');
const modelInput = document.getElementById('model');
const voiceInput = document.getElementById('voice');
const rateInput = document.getElementById('rate');
const continueBtn = document.getElementById('continue-btn');
const startBtn = document.getElementById('start-btn');
const muteBtn = document.getElementById('mute-btn');
const settingsBtn = document.getElementById('settings-btn');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
let transcriptEl = document.getElementById('transcript');
 
apiKeyInput.value = config.apiKey || '';
taskInput.value = config.task || '';
modelInput.value = config.model || '';
voiceInput.value = config.voice || '';
rateInput.value = config.rate || '';
 
continueBtn.addEventListener('click', () => {
  const apiKey = apiKeyInput.value.trim();
  if (!apiKey) { apiKeyInput.focus(); return; }
  saveConfig({
    apiKey,
    task: taskInput.value.trim(),
    model: modelInput.value.trim() || DEFAULTS.model,
    voice: voiceInput.value.trim(),
    rate: rateInput.value.trim() || DEFAULTS.rate,
  });
  goLive();
});
 
if (config.apiKey) goLive();
 
async function goLive() {
  setupEl.classList.add('hidden');
  liveEl.classList.remove('hidden');
 
  const isLocalhost = ['localhost', '127.0.0.1', '[::1]'].includes(location.hostname);
  if (!window.isSecureContext && !isLocalhost) { showInsecureContextHelp(); return; }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { setStatus('error', 'Browser has no getUserMedia'); return; }
 
  try {
    state.mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
    });
    state.videoEl.srcObject = state.mediaStream;
    setStatus('idle', 'Tap start when ready');
  } catch (err) {
    const name = err && err.name;
    if (name === 'NotAllowedError' || name === 'SecurityError' || name === 'PermissionDeniedError') {
      if (!window.isSecureContext && !isLocalhost) showInsecureContextHelp();
      else setStatus('error', 'Permission denied. Check Chrome site settings.');
    } else if (name === 'NotFoundError') setStatus('error', 'No camera or microphone found on this device');
    else setStatus('error', 'Camera/mic error: ' + (err.message || err));
  }
}
 
function showInsecureContextHelp() {
  setStatus('error', 'Page must be served over HTTPS');
  const help = document.createElement('div');
  help.id = 'transcript';
  help.className = 'transcript';
  help.style.maxHeight = 'none';
  help.innerHTML =
    '<div class="turn"><div class="who" style="color:#ff3355">Why this won\u2019t work yet</div>' +
    '<div class="text">Chrome only allows camera and microphone access on <b>HTTPS</b> pages. You opened this file via <b>' + (location.protocol || 'a non-https URL') + '</b>, which Chrome treats as insecure, so it silently blocks getUserMedia.</div></div>' +
    '<div class="turn"><div class="who" style="color:#00ff88">Fix in 30 seconds</div>' +
    '<div class="text">Host this on any HTTPS URL (GitHub Pages, Cloudflare Pages, Netlify) and open that on your phone.</div></div>';
  transcriptEl.replaceWith(help);
  transcriptEl = help;
}
 
settingsBtn.addEventListener('click', () => {
  stopSession();
  releaseCamera();
  liveEl.classList.add('hidden');
  setupEl.classList.remove('hidden');
  apiKeyInput.value = config.apiKey || '';
  taskInput.value = config.task || '';
  modelInput.value = config.model || '';
  voiceInput.value = config.voice || '';
  rateInput.value = config.rate || '';
});
 
startBtn.addEventListener('click', () => {
  if (state.status === 'idle' || state.status === 'error') startSession();
  else stopSession();
});
 
muteBtn.addEventListener('click', () => {
  state.muted = !state.muted;
  muteBtn.innerHTML = state.muted ? '&#128263;' : '&#128266;';
  if (state.muted && 'speechSynthesis' in window) window.speechSynthesis.cancel();
});
 
function setStatus(s, text) {
  state.status = s;
  statusDot.className = 'dot ' + (s === 'idle' ? '' : s);
  statusText.textContent = text || s;
  if (s === 'idle' || s === 'error') {
    startBtn.textContent = 'Start';
    startBtn.classList.remove('stop');
  } else {
    startBtn.textContent = 'Stop';
    startBtn.classList.add('stop');
  }
}
 
const MAX_TURNS_DISPLAY = 12;
function appendTranscript(who, text, partial=false) {
  const last = transcriptEl.lastElementChild;
  if (last && last.dataset.who === who && last.dataset.partial === '1') {
    last.querySelector('.text').textContent = text;
    if (!partial) last.dataset.partial = '0';
  } else {
    const turn = document.createElement('div');
    turn.className = 'turn';
    turn.dataset.who = who;
    turn.dataset.partial = partial ? '1' : '0';
    const whoEl = document.createElement('div');
    whoEl.className = 'who';
    whoEl.textContent = who === 'you' ? 'You' : 'Assistant';
    const textEl = document.createElement('div');
    textEl.className = 'text';
    textEl.textContent = text;
    turn.appendChild(whoEl);
    turn.appendChild(textEl);
    transcriptEl.appendChild(turn);
  }
  while (transcriptEl.children.length > MAX_TURNS_DISPLAY) transcriptEl.removeChild(transcriptEl.firstChild);
  transcriptEl.scrollTop = transcriptEl.scrollHeight;
}
 
const SYSTEM_PROMPT_BASE = `You are a hands-free AI assistant the user is wearing as smart glasses. You see what they see (a snapshot of the camera at the moment they spoke) and you hear what they say. You speak back through their phone speaker or headphones. Help them complete physical tasks: repairs, assembly, installation, troubleshooting, identification, cooking, anything hands-on.
 
Style:
- Speak in short, calm, direct sentences. Like a coach standing next to them.
- Identify objects specifically when asked: brand, model, part number, version. Read labels if you can see them.
- Use Google Search whenever you need real specifics: torque values, manuals, part numbers, error codes, recipe steps, model differences.
- Confirm progress briefly: "good, that's it" / "yep, right one" / "tighten a bit more".
- Don't narrate the obvious. Don't describe what they're already doing. Add value.
- If you can't see well, ask them to move closer or change angle.
- Keep responses under ~30 words unless they explicitly ask for detail. Spoken-style English.
 
Each user message includes one image: that's what they're looking at right now.`;
 
function systemPromptText() {
  return SYSTEM_PROMPT_BASE + (config.task ? `\n\nThe user told you up front they want help with: "${config.task}". Use this as starting context.` : '');
}
 
// ============================================================
// Speech Recognition (browser STT)
// ============================================================
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus('error', 'Browser has no speech recognition'); return false; }
  const r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.lang = 'en-US';
 
  r.onresult = (e) => {
    let interim = '';
    let finalText = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const tr = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalText += tr;
      else interim += tr;
    }
    if (finalText.trim()) {
      appendTranscript('you', finalText.trim(), false);
      onUserSaid(finalText.trim());
    } else if (interim.trim()) {
      appendTranscript('you', interim.trim(), true);
    }
  };
 
  r.onspeechstart = () => {
    // user starts talking — interrupt the assistant
    if (state.status === 'speaking' && 'speechSynthesis' in window) {
      window.speechSynthesis.cancel();
    }
  };
 
  r.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted' || e.error === 'audio-capture') return;
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      setStatus('error', 'Mic permission denied for speech recognition');
      state.recognitionWantOn = false;
    } else {
      console.warn('SR error', e.error);
    }
  };
 
  r.onend = () => {
    if (state.recognitionWantOn) {
      // Restart after a short delay; Chrome on Android stops on silence
      setTimeout(() => { if (state.recognitionWantOn) { try { r.start(); } catch {} } }, 200);
    }
  };
 
  state.recognition = r;
  return true;
}
 
function startListening() {
  state.recognitionWantOn = true;
  if (!state.recognition) { if (!initRecognition()) return; }
  setStatus('listening', 'Listening');
  try { state.recognition.start(); } catch {}
}
 
function pauseListening() {
  state.recognitionWantOn = false;
  if (state.recognition) { try { state.recognition.stop(); } catch {} }
}
 
// ============================================================
// Session lifecycle
// ============================================================
function startSession() {
  if (!state.mediaStream) { setStatus('error', 'Camera/mic not ready'); return; }
  state.conversation = [];
  transcriptEl.innerHTML = '';
 
  // Wake lock
  (async () => { try { if ('wakeLock' in navigator) state.wakeLock = await navigator.wakeLock.request('screen'); } catch {} })();
 
  // "Prime" speech synthesis with an empty utterance so Android allows it later
  if ('speechSynthesis' in window) {
    try {
      const u = new SpeechSynthesisUtterance('');
      window.speechSynthesis.speak(u);
    } catch {}
  }
 
  startListening();
}
 
function stopSession() {
  pauseListening();
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  if (state.wakeLock) { try { state.wakeLock.release(); } catch {} state.wakeLock = null; }
  setStatus('idle', 'Tap start when ready');
}
 
function releaseCamera() {
  if (state.mediaStream) {
    state.mediaStream.getTracks().forEach(t => { try { t.stop(); } catch {} });
    state.mediaStream = null;
    state.videoEl.srcObject = null;
  }
}
 
// ============================================================
// One turn: user said X -> capture frame -> ask Gemini -> speak
// ============================================================
const MAX_HISTORY = 8; // keep last N user/model turns
async function onUserSaid(text) {
  if (!text || state.status === 'thinking') return;
  pauseListening();
  setStatus('thinking', 'Thinking...');
 
  const frame = captureFrame();
  const userParts = [{ text }];
  if (frame) userParts.push({ inline_data: { mime_type: 'image/jpeg', data: frame } });
  state.conversation.push({ role: 'user', parts: userParts });
  // trim history
  while (state.conversation.length > MAX_HISTORY * 2) state.conversation.shift();
 
  try {
    const reply = await callGemini();
    if (!reply) {
      setStatus('listening', 'Listening');
      startListening();
      return;
    }
    appendTranscript('assistant', reply, false);
    state.conversation.push({ role: 'model', parts: [{ text: reply }] });
    speak(reply);
  } catch (err) {
    appendTranscript('assistant', '[error] ' + (err.message || err), false);
    setStatus('error', 'Error: ' + (err.message || err));
    setTimeout(() => { if (state.status === 'error') startListening(); }, 2500);
  }
}
 
async function callGemini() {
  const model = (config.model || DEFAULTS.model).replace(/^models\//, '');
  // Strip out images from older turns to keep payload reasonable
  const contents = state.conversation.map((c, i, arr) => {
    if (i === arr.length - 1) return c; // keep image only on most recent user turn
    return { role: c.role, parts: c.parts.filter(p => !p.inline_data && !p.inlineData) };
  });
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(config.apiKey)}`;
  const body = {
    system_instruction: { parts: [{ text: systemPromptText() }] },
    contents,
    tools: [{ google_search: {} }],
    generation_config: { temperature: 0.6, max_output_tokens: 256 },
  };
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const t = await res.text();
  if (!res.ok) {
    // Retry once without google_search, in case the model variant doesn't support it
    if (/google_search|tool|unsupported/i.test(t)) {
      const body2 = { ...body }; delete body2.tools;
      const r2 = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body2),
      });
      const t2 = await r2.text();
      if (!r2.ok) throw new Error('HTTP ' + r2.status + ': ' + t2.slice(0, 240));
      return extractText(JSON.parse(t2));
    }
    throw new Error('HTTP ' + res.status + ': ' + t.slice(0, 240));
  }
  return extractText(JSON.parse(t));
}
 
function extractText(data) {
  const cand = data && data.candidates && data.candidates[0];
  if (!cand) return '';
  const parts = (cand.content && cand.content.parts) || [];
  return parts.map(p => p.text || '').filter(Boolean).join(' ').trim();
}
 
// ============================================================
// TTS playback
// ============================================================
function pickVoice() {
  if (!('speechSynthesis' in window)) return null;
  const all = window.speechSynthesis.getVoices() || [];
  const preferFragment = (config.voice || '').toLowerCase();
  if (preferFragment) {
    const m = all.find(v => v.name.toLowerCase().includes(preferFragment));
    if (m) return m;
  }
  return all.find(v => v.lang && v.lang.toLowerCase().startsWith('en-us'))
      || all.find(v => v.lang && v.lang.toLowerCase().startsWith('en'))
      || all[0]
      || null;
}
 
function speak(text) {
  if (state.muted || !('speechSynthesis' in window)) {
    setStatus('listening', 'Listening');
    startListening();
    return;
  }
  setStatus('speaking', 'Speaking');
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const v = pickVoice();
  if (v) u.voice = v;
  const rate = parseFloat(config.rate || DEFAULTS.rate);
  u.rate = isFinite(rate) && rate > 0 ? rate : 1.05;
  u.pitch = 1.0;
  u.onend = () => {
    if (state.status === 'speaking') {
      setStatus('listening', 'Listening');
      startListening();
    }
  };
  u.onerror = () => {
    if (state.status === 'speaking') {
      setStatus('listening', 'Listening');
      startListening();
    }
  };
  // Some browsers (Android Chrome) need this kick when the page hasn't fully loaded voices yet
  setTimeout(() => window.speechSynthesis.speak(u), 50);
}
 
// Voices may load asynchronously; force a refresh
if ('speechSynthesis' in window) {
  window.speechSynthesis.onvoiceschanged = () => { /* voices ready */ };
}
 
// ============================================================
// Frame capture
// ============================================================
let frameCanvas = null, frameCtx = null;
function captureFrame() {
  if (!state.videoEl.videoWidth) return null;
  const W = 800;
  const H = Math.round(state.videoEl.videoHeight * (W / state.videoEl.videoWidth));
  if (!frameCanvas) {
    frameCanvas = document.createElement('canvas');
    frameCtx = frameCanvas.getContext('2d');
  }
  if (frameCanvas.width !== W || frameCanvas.height !== H) {
    frameCanvas.width = W; frameCanvas.height = H;
  }
  frameCtx.drawImage(state.videoEl, 0, 0, W, H);
  return frameCanvas.toDataURL('image/jpeg', 0.7).split(',')[1];
}
 
// ============================================================
// Lifecycle housekeeping
// ============================================================
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && state.status !== 'idle' && state.status !== 'error') {
    try {
      if ('wakeLock' in navigator && !state.wakeLock) {
        state.wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch {}
  }
});
 
window.addEventListener('beforeunload', () => { stopSession(); releaseCamera(); });
</script>
